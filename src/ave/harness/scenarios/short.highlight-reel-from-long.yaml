id: short.highlight-reel-from-long
description: "Assemble a short highlight reel from a longer video"
tiers: [plan, execute, render]
prompt: "make me a 30-second highlight from this 5-minute vlog"
scope:
  allowed_agents: [editor]
  forbidden_layers: []
inputs:
  assets:
    - id: vlog
      ref: "lavfi://testsrc=size=1280x720:rate=24:duration=300"
expected:
  plan:
    tools_required:
      all_of: [detect_scenes, create_rough_cut]
      any_of: [render_with_preset]
    tools_forbidden: [find_fillers, web_search]
    irrelevance_allowed: false
  execute:
    timeline:
      clip_count: {min: 2, max: 30}
      duration_seconds: {min: 25.0, max: 35.0}
    snapshots_created: {min: 1}
    activity_log_entries: {min: 1}
  render:
    preset: "instagram_reel"
    rubric:
      - dimension: "duration"
        prompt: "Final video should be between 28 and 32 seconds."
        pass_threshold: 0.9
      - dimension: "pacing"
        prompt: "Cuts should match the energy of each scene; no scene held too long or too briefly."
        pass_threshold: 0.6
      - dimension: "format"
        prompt: "Output should be 1080x1920 vertical aspect ratio."
        pass_threshold: 0.95
    artifact_retention_days: 30
safety:
  must_be_reversible: true
  must_respect_scope: true
  state_sync_after_undo: true
  source_asset_immutable: true
