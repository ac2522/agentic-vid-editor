name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            python3-gi \
            python3-gi-cairo \
            gir1.2-glib-2.0 \
            libcairo2-dev \
            python3-venv

      - name: Set up venv with system packages
        run: |
          python3 -m venv --system-site-packages .venv
          .venv/bin/pip install pydantic pytest pytest-cov ruff==0.15.5
          .venv/bin/pip install -e . --no-deps

      - name: Lint with ruff
        run: .venv/bin/ruff check src/ tests/

      - name: Run tests (no GES, no GPU, no slow)
        run: .venv/bin/python -m pytest tests/ -v -m "not slow" --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.15.5

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/
